# ==============================================================================
# nginx.https.conf — HTTPS template for OCI DocGen
#
# This file is NOT used by default. To activate HTTPS:
#
#   sed 's/YOUR_DOMAIN/your.domain.com/g' nginx.https.conf > frontend/nginx.conf
#
# Then update docker-compose.yml (expose 443, mount /etc/letsencrypt:ro)
# and set FRONTEND_URL=https://your.domain.com in .env.
#
# See README.md → "HTTPS with Let's Encrypt" for full instructions.
# ==============================================================================

# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    root  /usr/share/nginx/html;
    index index.html;

    # ------------------------------------------------------------------
    # TLS — certificates are mounted from the host via docker-compose
    # volume (/etc/letsencrypt:/etc/letsencrypt:ro).
    # Certbot renews them on the host automatically; an nginx -s reload
    # post-renewal hook picks up the new files without a container rebuild.
    # ------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Modern TLS — supports TLS 1.2 and 1.3; drops deprecated 1.0/1.1
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # HSTS — instructs browsers to always use HTTPS for this domain (1 year)
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Allow larger request bodies for document generation (infra data can exceed 1 MB)
    client_max_body_size 20m;

    # ------------------------------------------------------------------
    # Static files
    # ------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ------------------------------------------------------------------
    # API reverse proxy
    # ------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Swagger UI
    location /docs {
        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ReDoc (documentação alternativa)
    location /redoc {
        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # OpenAPI schema (necessário para o Swagger carregar)
    location /openapi.json {
        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}