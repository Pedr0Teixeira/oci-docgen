name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - develop

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: ruff check backend/ --output-format=github

  validate-env:
    name: Validate .env.example
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check .env.example exists and has no real secrets
        run: |
          if [ ! -f ".env.example" ]; then
            echo "::error::.env.example not found — add it to the repo root."
            exit 1
          fi

          # Reject if any value looks like a real OCI key fingerprint (xx:xx:xx pattern)
          if grep -Eq '[0-9a-f]{2}(:[0-9a-f]{2}){15}' .env.example; then
            echo "::error::.env.example appears to contain a real OCI key fingerprint."
            exit 1
          fi

          echo ".env.example looks clean."
